name: Stadia Maps
description: >-
  Stadia Maps is a cutting-edge mapping platform providing high-quality, detailed
  maps and location APIs for developers. The platform offers routing and navigation,
  geocoding and search, elevation data, time zone lookups, isochrone analysis,
  and account management. Stadia Maps delivers GDPR-compliant EU endpoints, rich
  map styling options, and official SDKs for TypeScript, Python, Swift, Kotlin,
  and PHP. Trusted by developers building web, mobile, and data visualization
  applications worldwide.
