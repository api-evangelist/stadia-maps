    description: >-
      The Stadia Maps Geospatial API provides routing and turn-by-turn navigation,
      geocoding and autocomplete search, reverse geocoding, place lookups, elevation
      profiles, time zone information, road attributes, isochrones, map matching,
      time-distance matrices, and optimized routing. Secured with API key authentication.
      EU-region endpoint available for GDPR compliance.
